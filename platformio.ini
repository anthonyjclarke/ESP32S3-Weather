; PlatformIO Project Configuration File
;
; ESP32-S3 Weather Dashboard
; Hardware: Waveshare ESP32-S3-Touch-LCD-7 (ST7262 800x480 RGB, GT911 touch, CH422G IO expander)
; Framework and board settings are inherited from the working Pong Clock project.
;

[platformio]
default_envs = esp32s3-7inch

[env:esp32s3-7inch]
platform      = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board         = esp32-s3-devkitc-1
framework     = arduino
monitor_speed = 115200
upload_speed  = 230400
upload_port   = /dev/cu.usbmodem5AAF2820151
monitor_port  = /dev/cu.usbmodem5AAF2820151

platform_packages =
    framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32/releases/download/3.3.7/esp32-core-3.3.7.tar.xz

board_upload.flash_size         = 16MB
board_build.flash_size          = 16MB
board_build.arduino.memory_type = qio_opi
board_build.partitions          = partitions_custom.csv
board_build.filesystem          = littlefs

upload_flags =
    --no-stub

lib_deps =
    lovyan03/LovyanGFX@^1.1.16
    https://github.com/esp-arduino-libs/esp-lib-utils#v0.1.2
    tzapu/WiFiManager@^2.0.16-rc.2
    bblanchon/ArduinoJson@^6.21.5
    bitbank2/PNGdec@^1.1.0

build_unflags =
    -std=gnu++11

build_flags =
    -DBOARD_HAS_PSRAM
    -DDEBUG_LEVEL=3
    -DCORE_DEBUG_LEVEL=0
    -std=gnu++17

[env:esp32s3-7inch-ota]
extends         = env:esp32s3-7inch
upload_protocol = espota
upload_port     = ESP32S3-Weather.local
upload_flags    =
    --auth=change-me
